<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Animation Bundle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 1. Flip Card -->
  <div class="flip-card">
    <div class="flip-inner">
      <div class="flip-front">Front</div>
      <div class="flip-back">Back</div>
    </div>
  </div>

  <!-- 2. Letter-by-Letter Reveal -->
  <div class="reveal-text">
    <span style="--i:1">H</span>
    <span style="--i:2">e</span>
    <span style="--i:3">l</span>
    <span style="--i:4">l</span>
    <span style="--i:5">o</span>
  </div>

  <!-- 3. Typing Effect -->
  <div class="typing-box">
    <p class="typing-text">This text is typing with CSS only.</p>
  </div>

  <!-- 4. Overlay on Hover -->
  <div class="overlay-card">
    <div class="overlay-content">More Details</div>
  </div>

  <!-- 5. Staggered Grid Cards -->
  <div class="grid-container">
    <div class="grid-card">Card 1</div>
    <div class="grid-card">Card 2</div>
    <div class="grid-card">Card 3</div>
  </div>

  <!-- 6. CSS Modal -->
  <input type="checkbox" id="modal-toggle" hidden>
  <label for="modal-toggle" class="open-modal-button">Open Modal</label>
  <div class="modal-overlay"></div>
  <div class="modal-box">
    <label for="modal-toggle" class="modal-close">×</label>
    <h2>Modal Title</h2>
    <p>This is a pure CSS modal popup. No JavaScript used!</p>
  </div>

  <!-- 7. Zoom In -->
  <div class="box-zoom">Zoom In</div>

  <!-- 8. Fade In -->
  <div class="box-fade">Fade In</div>

  <!-- 9. Slide From Left -->
  <div class="box-slide-left">Slide Left</div>

  <!-- 10. Slide From Right -->
  <div class="box-slide-right">Slide Right</div>

  <!-- 11. Rotate -->
  <div class="box-rotate">Rotate Me</div>

  <!-- 12. Flip on Hover -->
  <div class="box-flip-hover">Hover Flip</div>

</body>
</html>
