<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slide In Hover</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Trigger -->
<label for="modal-toggle" class="open-btn">Open Modal</label>
<input type="checkbox" id="modal-toggle">

<!-- Modal -->
<div class="modal">
  <div class="modal-content">
    <label for="modal-toggle" class="close-btn">×</label>
    <h2>Hello, Saptarshi</h2>
    <p>This modal is powered by pure CSS.</p>
  </div>
</div>

</body>
</html>
