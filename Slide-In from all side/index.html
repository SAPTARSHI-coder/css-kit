<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slide In Left</title>
    <link rel="stylesheet" href="styleLeft.css" />
    <link rel="stylesheet" href="styleRight.css" />
    <link rel="stylesheet" href="styleTop.css" />
    <link rel="stylesheet" href="styleBottom.css" />
    <link rel="stylesheet" href="styleDiagonal.css" />
    <link rel="stylesheet" href="styleDiagonal1.css" />
    <link rel="stylesheet" href="styleDiagonal2.css" />
    <link rel="stylesheet" href="styleDiagonal3.css" />
  </head>
  <body>
    <div class="slide-left-box">
      <div class="slide-left">Slide from Left</div>
    </div>

    <div class="slide-right-box">
      <div class="slide-right">Slide from Right</div>
    </div>
    <div class="slide-top-box">
      <div class="slide-top">Slide from Top</div>
    </div>
    <div class="slide-bottom-box">
      <div class="slide-bottom">Slide from Bottom</div>
    </div>
    <div class="slide-diagonal-box">
      <div class="slide-diagonal">Top Left</div>
    </div>
    <div class="slide-diagonal-box-1">
      <div class="slide-diagonal-1">Top Right</div>
    </div>
    <div class="slide-diagonal-box-2 bottom-right">
      <div class="slide-diagonal-2">Bottom Right</div>
    </div>
    <div class="slide-diagonal-box-3 bottom-left">
      <div class="slide-diagonal-3">Bottom Left</div>
    </div>
  </body>
</html>
