<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slide In Hover</title>
    <link rel="stylesheet" href="styleFadeIn.css" />
    <link rel="stylesheet" href="styleFadeOut.css" />
    <link rel="stylesheet" href="styleFadeInOnPageLoad.css" />
    <link rel="stylesheet" href="styleFadeInWithDelay.css" />
    <link rel="stylesheet" href="styleFadeTransform.css" />
  </head>
  <body>
    <div class="fade-hover-box">
      <div class="fade-hover">Hover to Fade In</div>
    </div>
    <div class="fade-out-box">
      <div class="fade-out">Hover to Fade Out</div>
    </div>
    <div class="fade-load">I faded in on page load!</div>
    <div class="fade-delay">I appear after 2 seconds</div>
    <div class="fade-move">Fade + Slide Up</div>
  </body>
</html>
