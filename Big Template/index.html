<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio Section</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Typing Heading -->
  <div class="hero-type">
    <span class="typed-text">Built With Precision</span>
  </div>

  <!-- Project Grid -->
  <div class="card-grid">
    <div class="card fade-slide" style="animation-delay: 0.2s">
      <div class="overlay">Project One</div>
    </div>
    <div class="card fade-slide" style="animation-delay: 0.4s">
      <div class="overlay">Project Two</div>
    </div>
    <div class="card fade-slide" style="animation-delay: 0.6s">
      <div class="overlay">Project Three</div>
    </div>
  </div>

  <!-- Button -->
  <div class="cta-btn">
    <button class="btn-slide-icon">
      See More <span>→</span>
    </button>
  </div>

</body>
</html>
