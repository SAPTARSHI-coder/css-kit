<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Kits & Effects Registry</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Prism.js for code highlighting -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="url(#paint0_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 17L12 22L22 17" stroke="url(#paint1_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 12L12 17L22 12" stroke="url(#paint2_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="paint0_linear" x1="12" y1="2" x2="12" y2="12" gradientUnits="userSpaceOnUse">
                <stop stop-color="#38bdf8"/>
                <stop offset="1" stop-color="#818cf8"/>
              </linearGradient>
              <linearGradient id="paint1_linear" x1="12" y1="17" x2="12" y2="22" gradientUnits="userSpaceOnUse">
                <stop stop-color="#38bdf8"/>
                <stop offset="1" stop-color="#818cf8"/>
              </linearGradient>
              <linearGradient id="paint2_linear" x1="12" y1="12" x2="12" y2="17" gradientUnits="userSpaceOnUse">
                <stop stop-color="#38bdf8"/>
                <stop offset="1" stop-color="#818cf8"/>
              </linearGradient>
            </defs>
          </svg>
          <h1>CSS Kit Registry</h1>
        </div>
      </div>
      <div class="sidebar-nav">
        <ul id="category-list">
          <!-- Categories will be injected here -->
        </ul>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="topbar">
        <h2 id="current-category-title">Select a Category</h2>
      </header>

      <div class="content-scroll">
        <div id="welcome-message" class="welcome-view">
          <div class="glass-card welcome-card">
            <span class="emoji">✨</span>
            <h2>Welcome to your CSS Kit Registry</h2>
            <p>Select a category from the sidebar to preview the amazing interactions and copy the source code directly.</p>
          </div>
        </div>

        <div id="category-view" class="category-view hidden">
          <!-- Live Preview Sandbox -->
          <section class="preview-section">
            <div class="section-header">
              <h3>Live Preview</h3>
              <button class="action-btn" id="refresh-preview" title="Refresh Preview">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
              </button>
            </div>
            <div class="iframe-container glass-card">
              <iframe id="preview-frame" title="Live Preview"></iframe>
            </div>
          </section>

          <!-- Source Code Sections -->
          <section class="code-section">
            <div class="section-header">
              <h3><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg> Source Code</h3>
            </div>
            
            <div class="tabs-container glass-card" id="code-tabs">
              <div class="tabs-header">
                <button class="tab-btn active" data-target="html-code">HTML</button>
                <div id="css-tabs-header" class="css-tabs-wrapper">
                  <!-- CSS tabs will be injected here -->
                </div>
              </div>
              
              <div class="tabs-content">
                <div id="html-code" class="code-panel active">
                  <div class="code-utils">
                    <button class="copy-btn">Copy HTML</button>
                  </div>
                  <pre><code class="language-html" id="html-source"></code></pre>
                </div>
                <!-- CSS panels will be injected here -->
              </div>
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
